<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cifra Music - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f2f3f7;
            color: #222;
        }

        /* HERO */
        .hero {
            background: url('https://images.unsplash.com/photo-1511379938547-c1f69419868d?auto=format&fit=crop&w=1600&q=80') center/cover;
            height: 75vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            padding: 0 20px;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.7);
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 700;
            text-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }

        .hero p {
            font-size: 1.2rem;
            margin-top: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.6);
        }

        .btn-hero {
            margin-top: 25px;
            background: #ffd54f;
            padding: 12px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }
        .btn-hero:hover {
            background: #ffca28;
            transform: scale(1.05);
        }

        /* CATEGORIAS */
        .categorias {
            padding: 50px 20px;
            text-align: center;
        }

        .categorias h2 {
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: auto;
        }

        .cat-card {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        .cat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .cat-card img {
            width: 100%;
            border-radius: 10px;
        }

        .cat-card h3 {
            margin-top: 15px;
        }

        /* RODAPÉ */
        footer {
            margin-top: 40px;
            background: #111;
            color: #ccc;
            text-align: center;
            padding: 20px 10px;
        }
    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <section class="hero">
        <div>
            <h1>Bem-vindo à Cifra Music 🎸</h1>
            <p>Instrumentos, qualidade e alma musical — tudo em um só lugar.</p>
            <button class="btn-hero">Explore Agora</button>
        </div>
    </section>

    <!-- CATEGORIAS -->
    <section class="categorias">
        <h2>Navegue por Categorias</h2>

        <div class="grid">
            <div class="cat-card">
                <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?auto=format&fit=crop&w=800&q=60" alt="Guitarras">
                <h3>Guitarras</h3>
            </div>

            <div class="cat-card">
                <img src="https://images.unsplash.com/photo-1513883049090-d0b7439799bf?auto=format&fit=crop&w=800&q=60" alt="Teclados">
                <h3>Teclados</h3>
            </div>

            <div class="cat-card">
                <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?auto=format&fit=crop&w=800&q=60" alt="Violões">
                <h3>Violões</h3>
            </div>

            <div class="cat-card">
                <img src="https://images.unsplash.com/photo-1504274066651-8d31a536b11a?auto=format&fit=crop&w=800&q=60" alt="Baterias">
                <h3>Baterias</h3>
            </div>
        </div>
    </section>

    <footer>
        © 2025 Cifra Music — Todos os direitos reservados.
    </footer>

</body>
</html>
